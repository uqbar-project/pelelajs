name: Deploy to NPM

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type (only if no changeset exists)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      changelog_notes:
        description: 'Custom notes for the CHANGELOG (optional)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm (compatible with runner Node.js)
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_IT_NOTES: ${{ github.event.inputs.changelog_notes }}
        run: pnpm run release:npm -- ${{ github.event.inputs.version_type }}
