name: Deploy to NPM

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type (only if no changeset exists)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Bump Version
        run: |
          pnpm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          cd packages/core && pnpm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          cd ../../tools/pelela-cli && pnpm version ${{ github.event.inputs.version_type }} --no-git-tag-version

      - name: Build
        run: pnpm run release:core

      - name: Publish to NPM
        run: |
          cd packages/core
          pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push changes and tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add .
          git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags
